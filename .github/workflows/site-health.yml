name: Elusion Works Site Health Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "15 7,19 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Verify live site
        env:
          SITE_URL: https://elusionworks.com/
        run: |
          mkdir -p healthchecks
          node --input-type=module <<'EOF'
          import path from "node:path";
          import { readFile } from "node:fs/promises";
          import { chromium } from "playwright";

          const feed = JSON.parse(
            await readFile(path.join(process.cwd(), "data", "feed.json"), "utf8"),
          );
          const expectedCounts = [
            String(feed?.stats?.sites ?? 0),
            String(feed?.stats?.tools ?? 0),
            String(feed?.stats?.games ?? 0),
          ];

          const errors = [];
          const browser = await chromium.launch();
          const page = await browser.newPage({ viewport: { width: 1440, height: 1200 } });
          page.on("console", (message) => {
            if (message.type() === "error") {
              errors.push(message.text());
            }
          });

          const visitUrl = `${process.env.SITE_URL}?health=${Date.now()}`;
          await page.goto(visitUrl, { waitUntil: "networkidle" });
          await page.waitForSelector(".ew-cabinet-grid .ew-plate");

          const snapshot = await page.evaluate(() => ({
            counts: [...document.querySelectorAll("[data-count-to]")].map((node) =>
              node.getAttribute("data-count-to")?.trim() ?? ""
            ),
            cards: {
              total: document.querySelectorAll(".ew-cabinet-grid .ew-plate").length,
              websites: document.querySelectorAll('.ew-cabinet-grid .ew-plate[data-kind="website"]').length,
              tools: document.querySelectorAll('.ew-cabinet-grid .ew-plate[data-kind="tool"]').length,
              games: document.querySelectorAll('.ew-cabinet-grid .ew-plate[data-kind="game"]').length,
            },
            hasEditorialSection: Boolean(document.querySelector("#editorial")),
            hasEditorialResource: performance
              .getEntriesByType("resource")
              .some((entry) => entry.name.includes("editorial-hub")),
            footerLinks: [...document.querySelectorAll(".ew-footer-group a, .ew-footer-links a")].map((link) =>
              link.textContent.trim(),
            ),
          }));

          await page.screenshot({ path: "healthchecks/elusion-works-home.png", fullPage: false });
          await browser.close();

          const securityResponse = await fetch(`${process.env.SITE_URL}security.txt`, {
            headers: { "cache-control": "no-cache" },
          });
          const securityBody = await securityResponse.text();

          if (errors.length > 0) {
            throw new Error(`Console errors detected: ${errors.join(" | ")}`);
          }

          if (snapshot.counts.length < expectedCounts.length) {
            throw new Error(
              `Count badge mismatch: expected at least ${expectedCounts.length}, received ${snapshot.counts.length}`,
            );
          }

          expectedCounts.forEach((value, index) => {
            if (snapshot.counts[index] !== value) {
              throw new Error(`Count mismatch at index ${index}: expected ${value}, received ${snapshot.counts[index]}`);
            }
          });

          if (snapshot.cards.total < 10) {
            throw new Error(`Cabinet card mismatch: expected at least 10 plates, received ${snapshot.cards.total}`);
          }

          for (const group of ["websites", "tools", "games"]) {
            if (snapshot.cards[group] < 1) {
              throw new Error(`Cabinet group missing visible plates for ${group}`);
            }
          }

          if (snapshot.hasEditorialSection || snapshot.hasEditorialResource) {
            throw new Error("Editorial-only content appeared in the public site");
          }

          if (!snapshot.footerLinks.includes("Security")) {
            throw new Error("Security link missing from footer");
          }

          if (!securityResponse.ok || !securityBody.includes("Canonical:")) {
            throw new Error("security.txt is missing or incomplete");
          }

          console.log("Live site verified", { expectedCounts, snapshot });
          EOF

      - name: Upload healthcheck artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elusion-works-healthcheck
          path: healthchecks/

name: Deploy Elusion Works to Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 7,19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assemble static site
        run: |
          mkdir -p _site/assets _site/data
          cp index.html styles.css app.js cursor.js 404.html robots.txt sitemap.xml llms.txt security.txt _site/
          cp -r assets/. _site/assets/
          cp data/estate.js _site/data/

      - name: Verify static site bundle
        run: |
          test -f _site/index.html
          test -f _site/styles.css
          test -f _site/app.js
          test -f _site/cursor.js
          test -f _site/404.html
          test -f _site/security.txt
          test -f _site/data/estate.js
          test ! -f _site/data/editorial-hub.json
          test -f _site/assets/og-card.png
          test -f _site/assets/showcase/ai-resource-hub-site.jpg
          test -f _site/assets/showcase/a-list-site.jpg
          test -f _site/assets/showcase/kols-korner-site.jpg
          test -f _site/assets/showcase/axylusion-site.jpg
          test -f _site/assets/showcase/ghost-in-the-model-site.jpg
          test -f _site/assets/showcase/kol-tregaskes-photography-site.jpg
          test -f _site/assets/showcase/website-news-pipeline.svg
          test -f _site/assets/showcase/published-gallery-pipeline.svg
          test -f _site/assets/showcase/shared-website-tools.svg
          test -f _site/assets/showcase/games-in-development.svg
          test -f _site/assets/showcase/interactive-experiments.svg
          grep -q 'id="websites-grid"' _site/index.html
          grep -q 'id="tools-grid"' _site/index.html
          grep -q 'id="games-grid"' _site/index.html
          ! grep -q 'id="editorial"' _site/index.html
          ! grep -q 'editorial-hub' _site/app.js
          ! grep -R -E --include='*.html' --include='*.js' --include='*.txt' --include='*.xml' 'W:\\|C:\\|review_path|repo_path|review_dir' _site
          grep -q 'The umbrella for websites, tools, and playable ideas.' _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

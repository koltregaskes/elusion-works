name: Deploy Elusion Works to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site/assets _site/data
          cp index.html styles.css app.js 404.html robots.txt sitemap.xml llms.txt _site/
          cp -r assets/. _site/assets/
          cp -r data/. _site/data/

      - name: Verify static site bundle
        run: |
          test -f _site/index.html
          test -f _site/styles.css
          test -f _site/app.js
          test -f _site/404.html
          test -f _site/assets/og-card.png
          test -f _site/assets/showcase/ai-resource-hub-optimized.jpg
          test -f _site/assets/showcase/kols-korner-optimized.jpg
          test -f _site/assets/showcase/axylusion-optimized.jpg
          test -f _site/assets/showcase/website-news-pipeline.svg
          test -f _site/assets/showcase/games-in-development.svg
          grep -q 'id="featured-items"' _site/index.html
          grep -q 'id="results-summary"' _site/index.html
          grep -q 'The company behind a growing portfolio of digital products.' _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
